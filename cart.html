<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Game Store - Your Cart</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/cart.css" />
</head>

<body>

    <header class="main-header">
        <div class="header-container">
            <h1 class="logo">🎮 Retro Game Vault</h1>
            <nav class="main-nav">
                <a href="./index.html" class="nav-link">← Back to Store Catalog</a>
            </nav>
        </div>
    </header>

    <main class="cart-page-container">
        <h2 class="page-title">Your Shopping Cart</h2>

        <div class="cart-layout-grid">

            <section class="cart-items-section">
                <div id="cart-items-container">
                    <p class="cart-status-message">cart-items-container</p>
                    <p></p>
                </div>
            </section>

            <aside class="order-summary-sidebar">
                <div class="summary-card">
                    <h3>Order Summary</h3>
                    <hr>
                    <div class="summary-row">
                        <span>Total Items:</span>
                        <span id="cart-total-count">0</span>
                    </div>
                    <div class="summary-row total-price-row">
                        <span>Estimated Total:</span>
                        <span id="cart-total-price">$0.00</span>
                    </div>
                    <button id="btn-checkout" class="btn-checkout-primary" disabled>Proceed to Checkout</button>
                </div>
            </aside>

        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Retro Game Vault. Built for Portfolio Automation Practice.</p>
    </footer>

    <script type="module" src="js/cart.js"></script>
</body>

</html>
