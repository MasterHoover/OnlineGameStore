<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelVault | Retro & Modern Game Store</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/index_catalog.css" />
</head>

<body>

    <!-- Navigation Bar -->
    <header class="navbar">
        <div class="nav-container">
            <a href="#" class="brand-logo" id="nav-logo">PixelVault</a>
            <nav>
                <ul class="nav-links">
                    <li><a href="#" id="link-home" class="active">Home</a></li>
                    <li><a href="#" id="link-retro">Contact/Support</a></li>
                </ul>
            </nav>
            <div class="nav-actions">
                <a href="cart.html">
                    <button class="cart-btn" id="cart-trigger" data-testid="navbar-cart">
                        Cart (<span id="cart-count">0</span>)
                    </button>
                </a>
            </div>
        </div>
    </header>

    <!-- Hero Showcase Section -->
    <section class="hero-banner" id="featured-hero" data-testid="hero-carousel">
    </section>

    <!-- Main Content Area -->
    <main class="store-container">

        <!-- Filter/Search Sidebar (Great for Testing Interactivity) -->
        <aside class="sidebar" id="store-sidebar">
            <h3>Filters</h3>

            <div class="filter-group">
                <label for="search-input">Search Games</label>
                <input type="text" id="search-input" placeholder="Type to search..." data-testid="search-bar">
            </div>

            <div class="filter-group">
                <label for="era-select">Game Era</label>
                <select id="era-select" data-testid="era-dropdown">
                    <option value="all">All Eras</option>
                    <option value="modern">Modern Releases</option>
                    <option value="retro">Retro Vault</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="platform-select">Platform</label>
                <select id="platform-select" data-testid="platform-dropdown">
                </select>
            </div>
        </aside>

        <!-- Product Grid -->
        <section id="catalog-grid" class="catalog-grid">
        </section>
    </main>

    <footer>
        <p>&copy; 2026 PixelVault Media. All mock-up rights reserved.</p>
    </footer>

    <!-- SCRIPTS -->
    <script type="module" src="js/index_entry.js"></script>
</body>

</html>
